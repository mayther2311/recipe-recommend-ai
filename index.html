<!DOCTYPE html>
<html>
<head>
    <title>AI Image Tagger</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        #preview { max-width: 300px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>AI画像認識アプリ</h1>
    <input type="file" id="imageInput" accept="image/*">
    <button onclick="uploadImage()">解析実行</button>
    
    <div id="result">
        <p>結果: <span id="tag">-</span></p>
        <img id="preview">
    </div>

    
    <script>
        async function uploadImage() {
            const fileInput = document.getElementById('imageInput');
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const response = await fetch('/upload/', { method: 'POST', body: formData });
            const data = await response.json();
            
            document.getElementById('tag').innerText = data.detected_tag;
            document.getElementById('preview').src = "/static/" + data.filename;
        }
    </script>
</body>
</html>
